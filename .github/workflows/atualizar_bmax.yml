name: Atualizar BMax (diário)

on:
  schedule:
    - cron: '0 11 * * *'   # 08:00 BRT (UTC-3) todos os dias
  workflow_dispatch:
    inputs:
      force_enrich:
        description: 'Reprocessar todas as revendas no ZEN (inclusive as que já têm zen_id)'
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sincronizar_excel:
    name: 1 — Sincronizar Excel → Supabase
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
      - name: Instalar dependências
        run: pip install requests openpyxl msal python-dotenv
      - name: Sincronizar Excel (SharePoint → Supabase)
        run: python scripts/sincronizar_excel_bmax.py
        env:
          MSAL_TOKEN_CACHE:     ${{ secrets.MSAL_TOKEN_CACHE }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL_BMAX }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY_BMAX }}

  corrigir_banco:
    name: 2 — Corrigir classe/rep/duplicatas
    runs-on: ubuntu-latest
    needs: sincronizar_excel
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
      - name: Instalar dependências
        run: pip install requests python-dotenv
      - name: Corrigir banco BMax
        run: python scripts/corrigir_banco_bmax.py
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL_BMAX }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY_BMAX }}

  enriquecer_zen:
    name: 3 — Enriquecer filiais via ZEN
    runs-on: ubuntu-latest
    needs: corrigir_banco
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
      - name: Instalar dependências
        run: pip install requests python-dotenv
      - name: Enriquecer CEP e filiais via ZEN
        run: python scripts/enriquecer_cep_zen.py ${{ inputs.force_enrich && '--force' || '' }}
        env:
          ZEN_EMAIL:            ${{ secrets.ZEN_EMAIL }}
          ZEN_SENHA:            ${{ secrets.ZEN_SENHA }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL_BMAX }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY_BMAX }}

  importar_cobertura:
    name: 4 — Importar cobertura de representantes
    runs-on: ubuntu-latest
    needs: sincronizar_excel
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
      - name: Instalar dependências
        run: pip install requests
      - name: Importar cobertura BMax
        run: python scripts/importar_cobertura_bmax.py
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL_BMAX }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY_BMAX }}

  publicar_portal:
    name: 5 — Publicar portal (Cloudflare Pages)
    runs-on: ubuntu-latest
    needs: sincronizar_excel
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Publicar index.html no Cloudflare Pages
        run: npx wrangler@latest pages deploy . --project-name=bmax-motor --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
