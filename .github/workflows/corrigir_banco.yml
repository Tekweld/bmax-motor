name: Corrigir Banco BMax (classe/rep/duplicatas)

on:
  workflow_dispatch:

jobs:
  corrigir:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests python-dotenv

      - name: Corrigir banco BMax
        run: python scripts/corrigir_banco_bmax.py
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL_BMAX }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY_BMAX }}
