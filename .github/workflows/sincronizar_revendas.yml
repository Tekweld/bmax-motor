name: Sincronizar Revendas BMax

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Forçar atualização mesmo sem mudanças na lista'
        type: boolean
        default: false

jobs:
  sincronizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests python-dotenv

      - name: Executar sincronização
        run: python scripts/enrich_revendas_bmax.py ${{ inputs.force && '--force' || '' }}
        env:
          ZEN_EMAIL:            ${{ secrets.ZEN_EMAIL }}
          ZEN_SENHA:            ${{ secrets.ZEN_SENHA }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL_BMAX }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY_BMAX }}
          FORCE_UPDATE:         ${{ inputs.force }}
