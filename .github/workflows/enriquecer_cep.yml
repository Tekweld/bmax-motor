name: Enriquecer CEP Revendas (ZEN)

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Reprocessar todas as revendas (inclusive as que já têm zen_id)'
        type: boolean
        default: false

jobs:
  enriquecer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests python-dotenv

      - name: Enriquecer CEP via ZEN
        run: python scripts/enriquecer_cep_zen.py ${{ inputs.force && '--force' || '' }}
        env:
          ZEN_EMAIL:            ${{ secrets.ZEN_EMAIL }}
          ZEN_SENHA:            ${{ secrets.ZEN_SENHA }}
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL_BMAX }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY_BMAX }}
